<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Indian operations map showing Cochin, Madurai, Bombay, Gujarat, Jaipur, Delhi, Kolkata, Siliguri and Vizag">
  <defs>
