      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="india" x1="0" y1="0" x2="1" y2="1">
